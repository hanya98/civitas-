<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Contractor Portal — CIVITAS</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans:wght@400;500;600;700&display=swap"
        rel="stylesheet" />
    <link rel="stylesheet" href="style2.css" />
    <script src="auth.js"></script>

    <!-- Firebase -->
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyARUCovi6he0lYE6pikBB_doz72Nae2-h0",
            authDomain: "grievance-form-39f6a.firebaseapp.com",
            projectId: "grievance-form-39f6a",
            storageBucket: "grievance-form-39f6a.firebasestorage.app",
            messagingSenderId: "149185682282",
            appId: "1:149185682282:web:785c21c17d3470592ca313"
        };
        firebase.initializeApp(firebaseConfig);
        window.db = firebase.firestore();
    </script>
    <link rel="stylesheet" href="contractor.css" />
</head>

<body>
    <script>Auth.requireContractorLogin();</script>

    <!-- NAVBAR -->
    <nav class="navbar">
        <ul class="nav-right">
            <li><a href="index.html">Home</a></li>
            <div class="nav-center">
                <div class="logo">🏗️ CIVITAS</div>
            </div>
            <div class="tricolor-bar"><span class="stripe saffron"></span><span class="stripe white"></span><span
                    class="stripe green"></span></div>
        </ul>
        <div class="nav-left">
            <a href="#" class="login-btn admin"
                onclick="Auth.contractorLogout(); window.location.href='index.html'; return false;">Logout</a>
        </div>
    </nav>
    <div class="tricolor-bar"><span class="stripe saffron"></span><span class="stripe white"></span><span
            class="stripe green"></span></div>

    <!-- HEADER -->
    <div id="cnt-header">
        <div class="cnt-header-inner">
            <div>
                <h1 class="cnt-title">🏗️ Contractor Portal</h1>
                <p class="cnt-subtitle">Manage Projects, Bills & Payments</p>
            </div>
            <div class="cnt-header-meta">
                <div class="cnt-id-badge" id="cnt-id-badge">ID: CNT001</div>
                <button class="cnt-btn cnt-btn-primary" id="new-bill-btn">+ Submit Bill</button>
            </div>
        </div>
    </div>

    <!-- STATS -->
    <div id="cnt-stats">
        <div class="cnt-stat-card">
            <div class="cnt-stat-icon" style="background:#e8eef8">📦</div>
            <div>
                <div class="cnt-stat-val" id="cs-projects">—</div>
                <div class="cnt-stat-label">Projects</div>
            </div>
        </div>
        <div class="cnt-stat-card">
            <div class="cnt-stat-icon" style="background:#fff3ec">⏳</div>
            <div>
                <div class="cnt-stat-val" id="cs-pending">—</div>
                <div class="cnt-stat-label">Pending Bills</div>
            </div>
        </div>
        <div class="cnt-stat-card">
            <div class="cnt-stat-icon" style="background:#e6f4ed">✅</div>
            <div>
                <div class="cnt-stat-val" id="cs-approved">—</div>
                <div class="cnt-stat-label">Approved</div>
            </div>
        </div>
        <div class="cnt-stat-card">
            <div class="cnt-stat-icon" style="background:#fdf8ec">💰</div>
            <div>
                <div class="cnt-stat-val" id="cs-amount">—</div>
                <div class="cnt-stat-label">Total Billed</div>
            </div>
        </div>
    </div>

    <!-- TABS -->
    <div id="cnt-main">
        <div id="cnt-tabs">
            <button class="cnt-tab active" data-tab="projects">📦 Projects</button>
            <button class="cnt-tab" data-tab="bills">🧾 Bills</button>
            <button class="cnt-tab" data-tab="payments">💰 Payments</button>
        </div>

        <!-- PROJECTS TAB -->
        <div class="cnt-tab-panel active" id="tab-projects">
            <div id="projects-grid" class="projects-grid"></div>
        </div>

        <!-- BILLS TAB -->
        <div class="cnt-tab-panel" id="tab-bills">
            <div id="bills-list" class="bills-list"></div>
        </div>

        <!-- PAYMENTS TAB -->
        <div class="cnt-tab-panel" id="tab-payments">
            <div id="payments-list" class="payments-list"></div>
        </div>
    </div>

    <!-- SUBMIT BILL MODAL -->
    <div id="bill-modal-overlay" class="cnt-modal-overlay">
        <div class="cnt-modal">
            <div class="cnt-modal-header">
                <div class="cnt-modal-title">🧾 Submit New Bill</div>
                <button class="cnt-modal-close" id="bill-modal-close">×</button>
            </div>
            <div class="cnt-modal-body">
                <div class="cnt-field">
                    <label>Project *</label>
                    <select id="b-project">
                        <option value="">-- Select Project --</option>
                    </select>
                </div>
                <div class="cnt-field-row">
                    <div class="cnt-field">
                        <label>Bill Description *</label>
                        <input type="text" id="b-desc" placeholder="e.g., Road repair materials" />
                    </div>
                    <div class="cnt-field">
                        <label>Amount (₹) *</label>
                        <input type="number" id="b-amount" placeholder="0" min="0" step="100" />
                    </div>
                </div>
                <div class="cnt-field-row">
                    <div class="cnt-field">
                        <label>Bill Date *</label>
                        <input type="date" id="b-date" />
                    </div>
                    <div class="cnt-field">
                        <label>Category</label>
                        <select id="b-category">
                            <option value="materials">Materials</option>
                            <option value="labour">Labour</option>
                            <option value="equipment">Equipment</option>
                            <option value="other">Other</option>
                        </select>
                    </div>
                </div>
                <div class="cnt-field">
                    <label>Work Completed (Details)</label>
                    <textarea id="b-work" rows="3" placeholder="Describe the work completed for this bill…"></textarea>
                </div>
                <div class="invoice-preview" id="invoice-preview" style="display:none">
                    <div class="invoice-preview-badge">📄 Invoice Preview</div>
                    <div id="invoice-preview-content"></div>
                </div>
            </div>
            <div class="cnt-modal-footer">
                <button class="cnt-btn cnt-btn-ghost" id="preview-invoice-btn">👁 Preview Invoice</button>
                <button class="cnt-btn cnt-btn-ghost" id="bill-modal-cancel">Cancel</button>
                <button class="cnt-btn cnt-btn-primary" id="bill-modal-save">Submit Bill</button>
            </div>
        </div>
    </div>

    <!-- INVOICE PRINT MODAL -->
    <div id="invoice-modal-overlay" class="cnt-modal-overlay">
        <div class="cnt-modal" style="max-width:700px">
            <div class="cnt-modal-header">
                <div class="cnt-modal-title">📄 Invoice</div>
                <div style="display:flex;gap:8px">
                    <button class="cnt-btn cnt-btn-primary" onclick="window.print()">🖨 Print</button>
                    <button class="cnt-modal-close" id="invoice-modal-close">×</button>
                </div>
            </div>
            <div class="cnt-modal-body" id="invoice-content"></div>
        </div>
    </div>

    <!-- TOAST -->
    <div id="cnt-toast"></div>

    <script src="contractor.js"></script>
</body>

</html>
