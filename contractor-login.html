<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Contractor Login — CIVITAS</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans:wght@400;500;600;700&display=swap"
        rel="stylesheet" />
    <link rel="stylesheet" href="style2.css" />
    <script src="auth.js"></script>
    <style>
        body {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            background: linear-gradient(135deg, #FF6200 0%, #1a3a6b 100%);
            font-family: 'Noto Sans', sans-serif;
        }

        .login-container {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }

        .login-card {
            background: #fff;
            border-radius: 20px;
            padding: 48px 40px;
            max-width: 400px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }

        .login-logo {
            text-align: center;
            font-size: 2.8rem;
            margin-bottom: 8px;
        }

        .login-brand {
            text-align: center;
            font-size: 1.5rem;
            font-weight: 700;
            color: #FF6200;
            margin-bottom: 4px;
        }

        .login-role-wrap {
            text-align: center;
            margin-bottom: 28px;
        }

        .login-role {
            font-size: 0.82rem;
            color: #718096;
            background: #fff3ec;
            padding: 4px 14px;
            border-radius: 20px;
            display: inline-block;
        }

        .field {
            margin-bottom: 20px;
        }

        .field label {
            display: block;
            font-size: 0.82rem;
            font-weight: 600;
            color: #444;
            margin-bottom: 6px;
        }

        .field input {
            width: 100%;
            padding: 12px 16px;
            border: 1.5px solid #d0d5dd;
            border-radius: 10px;
            font-size: 0.95rem;
            outline: none;
            transition: border-color 0.2s;
            box-sizing: border-box;
        }

        .field input:focus {
            border-color: #FF6200;
        }

        .btn-login {
            width: 100%;
            padding: 14px;
            background: #FF6200;
            color: #fff;
            border: none;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
            margin-top: 8px;
        }

        .btn-login:hover {
            background: #d94f00;
        }

        .err-msg {
            color: #c0392b;
            font-size: 0.83rem;
            margin-top: 10px;
            text-align: center;
            display: none;
        }

        .back-link {
            text-align: center;
            margin-top: 20px;
            font-size: 0.83rem;
            color: #718096;
        }

        .back-link a {
            color: #FF6200;
            text-decoration: none;
            font-weight: 600;
        }

        .hint {
            font-size: 0.75rem;
            color: #a0aec0;
            margin-top: 16px;
            text-align: center;
            background: #f7f8fa;
            border-radius: 8px;
            padding: 8px;
        }
    </style>
</head>

<body>
    <div class="login-container">
        <div class="login-card">
            <div class="login-logo">🏗️</div>
            <div class="login-brand">CIVITAS</div>
            <div class="login-role-wrap"><span class="login-role">Contractor Portal</span></div>

            <div class="field">
                <label for="contractor-id">Contractor ID</label>
                <input type="text" id="contractor-id" placeholder="e.g., CNT001" autocomplete="username" />
            </div>
            <div class="field">
                <label for="contractor-pwd">Password</label>
                <input type="password" id="contractor-pwd" placeholder="Enter your password"
                    autocomplete="current-password" />
            </div>

            <button class="btn-login" id="login-btn">Login to Contractor Portal</button>
            <div class="err-msg" id="err-msg">❌ Invalid credentials. Please try again.</div>

            <div class="hint">Demo: ID <strong>CNT001</strong> / Password <strong>contractor123</strong></div>
            <div class="back-link"><a href="index.html">← Back to Home</a></div>
        </div>
    </div>

    <script>
        if (Auth.isContractorLoggedIn()) {
            const redir = new URLSearchParams(window.location.search).get('redirect');
            window.location.href = redir ? decodeURIComponent(redir) : 'contractor.html';
        }

        const CONTRACTORS = { CNT001: 'contractor123', CNT002: 'contractor123', CNT003: 'contractor123' };

        document.getElementById('login-btn').addEventListener('click', doLogin);
        document.getElementById('contractor-pwd').addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });

        function doLogin() {
            const id = document.getElementById('contractor-id').value.trim().toUpperCase();
            const pwd = document.getElementById('contractor-pwd').value;
            const err = document.getElementById('err-msg');
            if (CONTRACTORS[id] === pwd) {
                Auth.contractorLogin(id);
                err.style.display = 'none';
                const redir = new URLSearchParams(window.location.search).get('redirect');
                window.location.href = redir ? decodeURIComponent(redir) : 'contractor.html';
            } else {
                err.style.display = 'block';
                document.getElementById('contractor-pwd').value = '';
            }
        }
    </script>
</body>

</html>
